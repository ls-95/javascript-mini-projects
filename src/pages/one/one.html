<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,100..700;1,100..700&display=swap"
      rel="stylesheet"
    />
    <script
      src="https://kit.fontawesome.com/a8156b8a54.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="one.css" />
    <title>Project One</title>
  </head>
  <body>
    <header>
      <nav>
        <div>
          <p class="home-page"><a href="/index.html">Mini JS Projects</a></p>
        </div>
        <div class="hamburger-icon-container">
          <button class="hamburger-btn" onclick="handleMenuToggle()">
            <i class="fa-solid fa-bars"></i>
          </button>
        </div>
        <div class="nav-pages">
          <ul class="page-links" id="page-links">
            <li class="nav-link"><a href="one.html">One</a></li>
            <li class="nav-link"><a href="/src/pages/two/two.html">Two</a></li>
            <li class="nav-link">
              <a href="/src/pages/three/three.html">Three</a>
            </li>
            <li class="nav-link">
              <a href="/src/pages/four/four.html">Four</a>
            </li>
            <li class="nav-link">
              <a href="/src/pages/five/five.html">Five</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <div class="game-container">
        <h1>Rock - Paper - Scissors</h1>
        <div class="game-results">
          <p>
            <span class="underline">Computer score</span>:
            <span id="computer-score" class="score">0</span>
          </p>
          <p>
            <span class="underline">Your score</span>:
            <span id="user-score" class="score">0</span>
          </p>
        </div>
        <div class="reset-btn">
          <button
            class="btn"
            class="handleReset"
            id="reset-btn"
            onclick="handleReset()"
          >
            Reset
          </button>
        </div>
        <div class="game-btn-container">
          <button class="btn" onclick="handleGame('Rock')" id="rock-btn">
            Rock
          </button>
          <button class="btn" onclick="handleGame('Paper')" id="paper-btn">
            Paper
          </button>
          <button
            class="btn"
            onclick="handleGame('Scissors')"
            id="scissors-btn"
          >
            Scissors
          </button>
        </div>
        <div class="result">
          <p id="result"></p>
          <p id="win" class="win"></p>
        </div>
      </div>
    </main>
    <script src="one.js"></script>
  </body>
</html>
